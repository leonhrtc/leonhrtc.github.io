<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiftBox UK · 团队协作看板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#F5F2EC;
  --surface:#FFFFFF;
  --surface2:#EFEBE2;
  --ink:#1C1A16;
  --ink2:#5A574F;
  --ink3:#9C9890;
  --accent:#C84B31;
  --accent-light:#FAEEEA;
  --green:#2A6B44;
  --green-light:#E5F2EB;
  --amber:#B5650D;
  --amber-light:#FBF0DF;
  --blue:#1A4F8A;
  --blue-light:#E4EDF8;
  --border:rgba(28,26,22,0.1);
  --shadow:0 2px 12px rgba(28,26,22,0.08);
  --radius:10px;
}

body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

/* HEADER */
.header{background:var(--ink);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:14px;}
.logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.header-title{font-family:'Lora',serif;font-size:18px;font-weight:700;color:#F5F2EC;}
.header-sub{font-size:12px;color:rgba(245,242,236,0.5);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.member-badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;cursor:pointer;border:2px solid rgba(255,255,255,0.15);transition:transform 0.15s;}
.member-badge:hover{transform:scale(1.1);}

/* NAV TABS */
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:0;overflow-x:auto;}
.nav-tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
.nav-tab:hover{color:var(--ink);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* MAIN */
.main{padding:24px 28px;max-width:1200px;margin:0 auto;}

/* SECTION */
.section{display:none;}
.section.active{display:block;}

/* BOARD (kanban) */
.board{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;align-items:start;}

.column{background:var(--surface2);border-radius:var(--radius);padding:14px;}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.col-title{font-family:'Lora',serif;font-size:14px;font-weight:700;color:var(--ink);}
.col-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);background:var(--surface);padding:2px 7px;border-radius:20px;}
.col-add{width:24px;height:24px;border:none;background:none;cursor:pointer;color:var(--ink3);font-size:18px;line-height:1;border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.col-add:hover{background:var(--border);color:var(--ink);}

/* TASK CARD */
.task-card{background:var(--surface);border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid var(--border);cursor:grab;transition:all 0.15s;position:relative;}
.task-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.task-card.done{opacity:0.55;}
.task-card.done .task-title{text-decoration:line-through;color:var(--ink3);}

.task-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.task-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.task-check.checked{background:var(--green);border-color:var(--green);}
.task-check.checked::after{content:'✓';font-size:10px;color:#fff;}
.task-title{font-size:13px;font-weight:500;color:var(--ink);flex:1;line-height:1.4;}

.task-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tag{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;}
.tag-person{font-family:'DM Mono',monospace;font-size:10px;}

.task-note{font-size:12px;color:var(--ink2);margin:6px 0;line-height:1.5;border-left:2px solid var(--border);padding-left:8px;}
.task-del{position:absolute;top:8px;right:8px;width:20px;height:20px;border:none;background:none;color:var(--ink3);cursor:pointer;font-size:14px;border-radius:4px;display:none;align-items:center;justify-content:center;}
.task-card:hover .task-del{display:flex;}
.task-del:hover{background:var(--accent-light);color:var(--accent);}

/* ADD TASK FORM */
.add-form{background:var(--surface);border-radius:8px;padding:10px;margin-top:8px;border:1.5px dashed var(--border);display:none;}
.add-form.open{display:block;}
.add-form input,.add-form select,.add-form textarea{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--bg);margin-bottom:6px;outline:none;}
.add-form input:focus,.add-form select:focus,.add-form textarea:focus{border-color:var(--accent);}
.add-form textarea{resize:none;height:60px;}
.form-row{display:flex;gap:6px;}
.btn{padding:7px 14px;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#a83d27;}
.btn-ghost{background:transparent;color:var(--ink3);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface2);}

/* PROGRESS BAR */
.progress-wrap{margin-bottom:20px;}
.progress-header{display:flex;justify-content:space-between;margin-bottom:6px;}
.progress-label{font-size:12px;color:var(--ink2);}
.progress-pct{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);font-weight:500;}
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#E87A5D);border-radius:3px;transition:width 0.4s ease;}

/* IDEAS WALL */
.ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:16px;}
.idea-card{border-radius:10px;padding:16px;position:relative;animation:fadeIn 0.3s ease;}
.idea-card h4{font-family:'Lora',serif;font-size:14px;font-weight:700;margin-bottom:6px;}
.idea-card p{font-size:13px;line-height:1.6;color:rgba(0,0,0,0.65);}
.idea-card .idea-author{font-family:'DM Mono',monospace;font-size:10px;margin-top:10px;opacity:0.6;}
.idea-card .idea-del{position:absolute;top:10px;right:10px;width:20px;height:20px;border:none;background:rgba(0,0,0,0.1);border-radius:4px;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;}
.idea-card:hover .idea-del{display:flex;}

.idea-yellow{background:#FFF4C2;}
.idea-pink{background:#FFE4E4;}
.idea-green{background:#DFFCE9;}
.idea-blue{background:#DFF0FF;}
.idea-purple{background:#EDE4FF;}
.idea-orange{background:#FFE9D5;}

/* ADD IDEA */
.add-idea-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--surface);border:1.5px dashed var(--border);border-radius:10px;cursor:pointer;color:var(--ink3);font-size:13px;font-weight:500;transition:all 0.15s;width:100%;}
.add-idea-btn:hover{border-color:var(--accent);color:var(--accent);}

.idea-form{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);}
.idea-form h4{font-family:'Lora',serif;font-size:14px;font-weight:700;margin-bottom:12px;color:var(--ink);}
.color-pick{display:flex;gap:6px;margin-bottom:10px;}
.color-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.color-opt.selected{border-color:var(--ink);transform:scale(1.15);}

/* OVERVIEW */
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:18px;border:1px solid var(--border);}
.stat-num{font-family:'Lora',serif;font-size:32px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.stat-label{font-size:12px;color:var(--ink2);}

.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;}
.member-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;}
.member-card{background:var(--surface);border-radius:var(--radius);padding:16px;border:1px solid var(--border);}
.member-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.member-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.member-name{font-weight:600;font-size:14px;color:var(--ink);}
.member-role{font-size:12px;color:var(--ink3);}
.member-tasks{font-size:12px;color:var(--ink2);}

/* EMPTY STATE */
.empty{text-align:center;padding:32px 16px;color:var(--ink3);}
.empty-icon{font-size:28px;margin-bottom:8px;}
.empty-text{font-size:13px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:640px){
  .main{padding:16px;}
  .header{padding:14px 16px;}
  .nav{padding:0 16px;}
  .board{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🎁</div>
    <div>
      <div class="header-title">GiftBox UK</div>
      <div class="header-sub">团队协作看板</div>
    </div>
  </div>
  <div class="header-right">
    <div class="member-badge" style="background:#C84B31;" title="A · 技术">A</div>
    <div class="member-badge" style="background:#1A4F8A;" title="B · 英国运营">B</div>
    <div class="member-badge" style="background:#2A6B44;" title="C · 义乌货源">C</div>
    <div class="member-badge" style="background:#B5650D;" title="我 · 销售运营">我</div>
  </div>
</div>

<div class="nav">
  <div class="nav-tab active" onclick="showTab('overview')">📊 总览</div>
  <div class="nav-tab" onclick="showTab('tasks')">✅ 任务看板</div>
  <div class="nav-tab" onclick="showTab('ideas')">💡 灵感墙</div>
</div>

<div class="main">

  <!-- OVERVIEW -->
  <div class="section active" id="sec-overview">
    <div style="margin-bottom:20px;">
      <div class="progress-wrap">
        <div class="progress-header">
          <span class="progress-label">整体进度</span>
          <span class="progress-pct" id="overall-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="overall-bar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="overview-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">全部任务</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-done" style="color:var(--green)">0</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-inprogress" style="color:var(--amber)">0</div>
        <div class="stat-label">进行中</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-ideas" style="color:var(--blue)">0</div>
        <div class="stat-label">灵感记录</div>
      </div>
    </div>

    <div class="section-label">团队成员</div>
    <div class="member-grid">
      <div class="member-card">
        <div class="member-header">
          <div class="member-avatar" style="background:#C84B31;">A</div>
          <div><div class="member-name">A</div><div class="member-role">技术负责人 · 英国</div></div>
        </div>
        <div class="member-tasks" id="tasks-A">负责独立站搭建、Shopify配置、AI接入</div>
      </div>
      <div class="member-card">
        <div class="member-header">
          <div class="member-avatar" style="background:#1A4F8A;">B</div>
          <div><div class="member-name">B</div><div class="member-role">资金 · 英国运营</div></div>
        </div>
        <div class="member-tasks" id="tasks-B">负责公司注册、银行账户、本土对接</div>
      </div>
      <div class="member-card">
        <div class="member-header">
          <div class="member-avatar" style="background:#2A6B44;">C</div>
          <div><div class="member-name">C</div><div class="member-role">供应链 · 义乌</div></div>
        </div>
        <div class="member-tasks" id="tasks-C">负责义乌采购、供应商管理、质检</div>
      </div>
      <div class="member-card">
        <div class="member-header">
          <div class="member-avatar" style="background:#B5650D;">我</div>
          <div><div class="member-name">我</div><div class="member-role">销售运营 · 上海</div></div>
        </div>
        <div class="member-tasks" id="tasks-me">负责市场调研、内容营销、用户运营</div>
      </div>
    </div>
  </div>

  <!-- TASKS -->
  <div class="section" id="sec-tasks">
    <div class="board" id="board"></div>
  </div>

  <!-- IDEAS -->
  <div class="section" id="sec-ideas">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div>
        <div style="font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--ink);">灵感墙</div>
        <div style="font-size:13px;color:var(--ink3);margin-top:2px;">随时记录想法，任何人都可以添加</div>
      </div>
    </div>
    <button class="add-idea-btn" onclick="toggleIdeaForm()" id="idea-toggle-btn">
      <span style="font-size:18px;">+</span> 添加新灵感
    </button>
    <div id="idea-form-wrap" style="display:none;margin-top:12px;">
      <div class="idea-form">
        <h4>记录一个想法</h4>
        <input type="text" id="idea-title" placeholder="标题（如：定制蜡烛定价策略）">
        <textarea id="idea-body" placeholder="详细描述你的想法..."></textarea>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
          <span style="font-size:12px;color:var(--ink3);">颜色</span>
          <div class="color-pick">
            <div class="color-opt selected" style="background:#FFF4C2;" data-color="idea-yellow" onclick="selectColor(this)"></div>
            <div class="color-opt" style="background:#FFE4E4;" data-color="idea-pink" onclick="selectColor(this)"></div>
            <div class="color-opt" style="background:#DFFCE9;" data-color="idea-green" onclick="selectColor(this)"></div>
            <div class="color-opt" style="background:#DFF0FF;" data-color="idea-blue" onclick="selectColor(this)"></div>
            <div class="color-opt" style="background:#EDE4FF;" data-color="idea-purple" onclick="selectColor(this)"></div>
            <div class="color-opt" style="background:#FFE9D5;" data-color="idea-orange" onclick="selectColor(this)"></div>
          </div>
          <select id="idea-author" style="border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:'DM Sans',sans-serif;font-size:12px;background:var(--bg);color:var(--ink);">
            <option value="我">我</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary" onclick="addIdea()">添加</button>
          <button class="btn btn-ghost" onclick="toggleIdeaForm()">取消</button>
        </div>
      </div>
    </div>
    <div class="ideas-grid" id="ideas-grid"></div>
  </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const MEMBERS = {
  'A': {color:'#C84B31'},
  'B': {color:'#1A4F8A'},
  'C': {color:'#2A6B44'},
  '我': {color:'#B5650D'},
  '全员': {color:'#6B6B6B'}
};

const COLUMNS = [
  {id:'market', title:'📋 市场调研'},
  {id:'product', title:'📦 选品 & 供应链'},
  {id:'website', title:'💻 网站搭建'},
  {id:'company', title:'🏢 公司注册'},
  {id:'ops', title:'📣 运营 & 营销'},
  {id:'done', title:'✅ 已完成'},
];

let tasks = [
  {id:1,col:'market',title:'调研英国礼品盲盒竞品（含网站链接）',person:'我',note:'已完成初版报告，见共享文档',done:true,tags:['调研']},
  {id:2,col:'market',title:'访谈5–10名英国潜在用户，验证购买意愿',person:'我',note:'可通过英国华人圈找到目标用户',done:false,tags:['验证']},
  {id:3,col:'market',title:'分析竞品定价策略与用户评价',person:'我',note:'重点看TreatBox和The Mystery Gift Box的Trustpilot评价',done:false,tags:['调研']},
  {id:4,col:'product',title:'义乌采购首批样品（50–80件）',person:'C',note:'重点品类：香薰、小摆件、文具、家居小物',done:false,tags:['采购']},
  {id:5,col:'product',title:'筛选3–5家稳定供应商',person:'C',note:'测试交货时效、包装质量、起批量',done:false,tags:['供应链']},
  {id:6,col:'product',title:'确认DHL/FedEx义乌→英国快线报价',person:'B',note:'目标5–10天到达，约£10–15/单',done:false,tags:['物流']},
  {id:7,col:'product',title:'研究定制化选品（刻字蜡烛/名字毯子）',person:'C',note:'义乌有大量激光刻字工厂，成本很低',done:false,tags:['定制']},
  {id:8,col:'website',title:'Shopify建站，选付费主题模板',person:'A',note:'预算$150–200一次性，选简洁礼品风格',done:false,tags:['技术']},
  {id:9,col:'website',title:'上线3个价位段产品页（£28/£42/£58）',person:'A',note:'先不做问卷，测试基础购买意愿',done:false,tags:['技术']},
  {id:10,col:'website',title:'配置支付（Stripe）和物流追踪',person:'A',note:'需要公司注册完成后才能绑定',done:false,tags:['技术']},
  {id:11,col:'website',title:'接入AI礼物顾问（Claude API）',person:'A',note:'用户填收礼人信息→AI推荐盒型，单次成本约$0.03',done:false,tags:['AI','技术']},
  {id:12,col:'website',title:'产品重新拍照（白底+场景图）',person:'全员',note:'不能用义乌供应商的原图，需要自己拍',done:false,tags:['内容']},
  {id:13,col:'company',title:'注册英国Ltd公司（gov.uk，£50）',person:'B',note:'用B家地址作注册地址，24小时出结果',done:false,tags:['合规']},
  {id:14,col:'company',title:'开商业银行账户（Tide或Starling）',person:'B',note:'网上申请，不用跑银行',done:false,tags:['财务']},
  {id:15,col:'company',title:'四人股份分配方案确认',person:'全员',note:'注册前必须对齐，建议开一个短会',done:false,tags:['重要']},
  {id:16,col:'company',title:'注册英国VAT号（HMRC）',person:'B',note:'年营业额超£90k强制，建议提前主动注册',done:false,tags:['合规']},
  {id:17,col:'ops',title:'TikTok UK & Instagram账号注册',person:'我',note:'重点运营开箱内容，建立品牌认知',done:false,tags:['营销']},
  {id:18,col:'ops',title:'撰写首批5条开箱视频脚本',person:'我',note:'展示真实开箱过程，突出惊喜感',done:false,tags:['内容']},
  {id:19,col:'ops',title:'小红书账号（针对在英华人买手）',person:'我',note:'在英华人有大量送礼需求，是早期精准用户',done:false,tags:['营销']},
  {id:20,col:'ops',title:'制定退款&客服流程',person:'B',note:'参考TreatBox的无理由退款政策，建立信任',done:false,tags:['运营']},
];

let ideas = [
  {id:1,title:'定制生日盒',body:'用户输入收礼人生日，我们在盒中加入生日主题小物（蜡烛+小蛋糕模具+祝福卡），溢价空间大。',color:'idea-yellow',author:'我'},
  {id:2,title:'企业批量礼盒',body:'英国中小企业节日员工福利是个大市场，10–50份起批，标准化出货，客单价高且稳定。',color:'idea-blue',author:'B'},
  {id:3,title:'开箱视频营销',body:'每个盒子放一张小卡片，引导买家拍开箱视频@我们的账号，做UGC内容沉淀，比付费广告便宜。',color:'idea-green',author:'我'},
];

let nextTaskId = 21;
let nextIdeaId = 4;
let selectedColor = 'idea-yellow';
let activeMemberFilter = null;

// ── RENDER ────────────────────────────────────────────────────────────
function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  COLUMNS.forEach(col => {
    const colTasks = tasks.filter(t => t.col === col.id);
    const div = document.createElement('div');
    div.className = 'column';
    div.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col.title}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="col-count">${colTasks.length}</span>
          ${col.id!=='done'?`<button class="col-add" onclick="openAddForm('${col.id}')">+</button>`:''}
        </div>
      </div>
      <div class="tasks-list" id="col-${col.id}">
        ${colTasks.length===0?`<div class="empty"><div class="empty-icon">○</div><div class="empty-text">暂无任务</div></div>`:''}
        ${colTasks.map(t=>taskHTML(t)).join('')}
      </div>
      ${col.id!=='done'?`
      <div class="add-form" id="form-${col.id}">
        <input type="text" id="newtask-title-${col.id}" placeholder="任务名称...">
        <textarea id="newtask-note-${col.id}" placeholder="备注（可选）..."></textarea>
        <div class="form-row">
          <select id="newtask-person-${col.id}" style="flex:1;">
            <option value="我">我</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="全员">全员</option>
          </select>
        </div>
        <div class="form-row" style="margin-top:6px;">
          <button class="btn btn-primary" onclick="addTask('${col.id}')">添加</button>
          <button class="btn btn-ghost" onclick="closeAddForm('${col.id}')">取消</button>
        </div>
      </div>`:''}
    `;
    board.appendChild(div);
  });
  updateStats();
}

function taskHTML(t){
  const m = MEMBERS[t.person]||MEMBERS['全员'];
  const tagColors = {
    '调研':'background:#E3EDF8;color:#1A4F8A;',
    '验证':'background:#EDE4FF;color:#5B21B6;',
    '采购':'background:#FBF0DF;color:#B5650D;',
    '供应链':'background:#FBF0DF;color:#B5650D;',
    '物流':'background:#FBF0DF;color:#B5650D;',
    '定制':'background:#FFE4E4;color:#C84B31;',
    '技术':'background:#E5F2EB;color:#2A6B44;',
    'AI':'background:#1C1A16;color:#F5F2EC;',
    '内容':'background:#EDE4FF;color:#5B21B6;',
    '合规':'background:#FAEEEA;color:#C84B31;',
    '财务':'background:#E5F2EB;color:#2A6B44;',
    '重要':'background:#C84B31;color:#fff;',
    '营销':'background:#E3EDF8;color:#1A4F8A;',
    '运营':'background:#E5F2EB;color:#2A6B44;',
  };
  return `
    <div class="task-card ${t.done?'done':''}" id="task-${t.id}">
      <button class="task-del" onclick="deleteTask(${t.id})">✕</button>
      <div class="task-header">
        <div class="task-check ${t.done?'checked':''}" onclick="toggleTask(${t.id})"></div>
        <span class="task-title">${t.title}</span>
      </div>
      ${t.note?`<div class="task-note">${t.note}</div>`:''}
      <div class="task-meta">
        <span class="tag tag-person" style="background:${m.color}22;color:${m.color};">${t.person}</span>
        ${(t.tags||[]).map(tag=>`<span class="tag" style="${tagColors[tag]||'background:#eee;color:#666;'}">${tag}</span>`).join('')}
      </div>
    </div>`;
}

function renderIdeas(){
  const grid = document.getElementById('ideas-grid');
  if(ideas.length===0){
    grid.innerHTML='<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">💭</div><div class="empty-text">还没有灵感，点击上方添加</div></div>';
    return;
  }
  grid.innerHTML = ideas.map(idea=>`
    <div class="idea-card ${idea.color}" id="idea-${idea.id}">
      <button class="idea-del" onclick="deleteIdea(${idea.id})">✕</button>
      <h4>${idea.title}</h4>
      <p>${idea.body}</p>
      <div class="idea-author">— ${idea.author}</div>
    </div>`).join('');
}

// ── ACTIONS ───────────────────────────────────────────────────────────
function toggleTask(id){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  if(!t.done && t.col!=='done'){
    t.prevCol = t.col;
    t.col = 'done';
    t.done = true;
  } else if(t.done){
    t.col = t.prevCol||'market';
    t.done = false;
  }
  renderBoard();
}

function deleteTask(id){
  tasks = tasks.filter(t=>t.id!==id);
  renderBoard();
}

function openAddForm(colId){
  document.querySelectorAll('.add-form').forEach(f=>f.classList.remove('open'));
  document.getElementById('form-'+colId).classList.add('open');
  document.getElementById('newtask-title-'+colId).focus();
}

function closeAddForm(colId){
  document.getElementById('form-'+colId).classList.remove('open');
}

function addTask(colId){
  const title = document.getElementById('newtask-title-'+colId).value.trim();
  if(!title) return;
  const note = document.getElementById('newtask-note-'+colId).value.trim();
  const person = document.getElementById('newtask-person-'+colId).value;
  tasks.push({id:nextTaskId++,col:colId,title,person,note,done:false,tags:[]});
  closeAddForm(colId);
  renderBoard();
}

function toggleIdeaForm(){
  const wrap = document.getElementById('idea-form-wrap');
  const btn = document.getElementById('idea-toggle-btn');
  const open = wrap.style.display==='none';
  wrap.style.display = open?'block':'none';
  btn.style.display = open?'none':'flex';
}

function selectColor(el){
  document.querySelectorAll('.color-opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = el.dataset.color;
}

function addIdea(){
  const title = document.getElementById('idea-title').value.trim();
  const body = document.getElementById('idea-body').value.trim();
  const author = document.getElementById('idea-author').value;
  if(!title) return;
  ideas.unshift({id:nextIdeaId++,title,body:body||'…',color:selectedColor,author});
  document.getElementById('idea-title').value='';
  document.getElementById('idea-body').value='';
  toggleIdeaForm();
  renderIdeas();
  updateStats();
}

function deleteIdea(id){
  ideas = ideas.filter(i=>i.id!==id);
  renderIdeas();
  updateStats();
}

// ── STATS ─────────────────────────────────────────────────────────────
function updateStats(){
  const total = tasks.length;
  const done = tasks.filter(t=>t.done).length;
  const inprog = tasks.filter(t=>!t.done&&t.col!=='done').length;
  const pct = total>0?Math.round(done/total*100):0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-inprogress').textContent = inprog;
  document.getElementById('stat-ideas').textContent = ideas.length;
  document.getElementById('overall-pct').textContent = pct+'%';
  document.getElementById('overall-bar').style.width = pct+'%';
}

// ── TABS ──────────────────────────────────────────────────────────────
function showTab(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  event.target.classList.add('active');
  if(name==='tasks') renderBoard();
  if(name==='ideas') renderIdeas();
  if(name==='overview') updateStats();
}

// ── INIT ──────────────────────────────────────────────────────────────
updateStats();
</script>
</body>
</html>
